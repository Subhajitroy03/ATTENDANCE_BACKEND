name: Ping Base URL

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit base URL
        run: |
          echo "Pinging attendance backend"
          curl --fail --silent --show-error --max-time 20 --retry 2 \
          https://attendance-backend-dmce.onrender.com
