name: Ping Base URL

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit base URL
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL secret is not set."
            exit 1
          fi

          echo "Pinging $BASE_URL"
          curl --fail --silent --show-error --max-time 20 --retry 2 "$BASE_URL"
